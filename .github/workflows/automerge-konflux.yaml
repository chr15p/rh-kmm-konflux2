name: Auto-merge konflux PRs

#on:
#  schedule:
#    - cron: '*/30 * * * *'

on:
  pull_request:
    types: 
      - labeled


jobs:
  merge:
    if: ${{ github.event.label.name == 'ok-to-merge' }}
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: False
          ref: ${{ github.head_ref }}
      - name: merge PRs
        run: python .github/scripts/auto_merge.py --label "ok-to-merge"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

