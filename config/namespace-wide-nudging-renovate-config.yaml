---
apiVersion: v1
kind: ConfigMap
metadata:
  name: namespace-wide-nudging-renovate-config
  namespace: rh-kmm-tenant
data:
  #automerge: "true"
  #automergeType: "pr"
  #commitMessagePrefix: "custom namespace prefix message"
  #commitMessageSuffix: "custom namespace suffix message"
  fileMatch: ".*.yaml"
  #ignoreTests: "true"
  #gitLabIgnoreApprovals: "true"
  #platformAutomerge: "true"
  # eventually set `platformAutomerge: "false"` and configure your own schedule
  # automergeSchedule: "* 22-23,0-4 * * *; * * * * 0,6"
  labels: "konflux-nudge"
